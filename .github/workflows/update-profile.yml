name: Build Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      readme: ${{ steps.filter.outputs.readme }}
      architecture: ${{ steps.filter.outputs.architecture }}
      site: ${{ steps.filter.outputs.site }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            readme:
              - 'src-content/profile/**'
            architecture:
              - 'src-content/docs/**'
            site:
              - 'src-content/profile/**'

  build-docs:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    outputs:
      isBuilt: ${{ steps.run_build.outputs.IS_BUILT }}
    if: needs.detect-changes.outputs.readme == 'true' || needs.detect-changes.outputs.architecture == 'true' || needs.detect-changes.outputs.site == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set image
        id: set_image
        run: echo "IMAGE_NAME=ghcr.io/dieterbaier/docs-toolbox:latest" >> $GITHUB_OUTPUT

      - name: Pull runtime image if missing
        run: |
          IMAGE=${{ steps.set_image.outputs.IMAGE_NAME }}
          if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
            echo "📥 Pull $IMAGE from GHCR..."
            docker pull "$IMAGE"
          else
            echo "✅ Image $IMAGE already exists"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: $HOME/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run build
        id: run_build
        run: |
          CMD="./gradlew --no-daemon"

          if [ "${{ needs.detect-changes.outputs.readme }}" == "true" ]; then
            CMD="$CMD buildReadme"
          fi

          if [ "${{ needs.detect-changes.outputs.architecture }}" == "true" ]; then
            CMD="$CMD buildArchitecture"
          fi
          
          if [ "${{ needs.detect-changes.outputs.site }}" == "true" ]; then
            CMD="$CMD buildSite"
          fi
          
          echo "Running: $CMD"
          
          echo "IS_BUILT=false" >> $GITHUB_OUTPUT
          if [ "$CMD" == "./gradlew --no-daemon" ]; then
            echo "Nothing to build"
            exit 0
          fi
          
          echo "IS_BUILT=true" >> $GITHUB_OUTPUT
          
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v $HOME/.gradle:/root/.gradle \
            -w /app \
            ${{ steps.set_image.outputs.IMAGE_NAME }} \
            $CMD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.run_build.outputs.IS_BUILT == 'true'
        with:
          name: docs
          path: build/


  deploy:
    needs: [build-docs, detect-changes]
    runs-on: ubuntu-latest
    if: needs.build-docs.outputs.isBuilt == 'true'

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: build

      # --- Upload Site ---
      - name: Deploy Site (only debug yet)
        if: needs.detect-changes.outputs.site == 'true'
        run: |
          find ./build -type f

      # --- GitHub README ---
      - name: checkout github profile repo
        uses: actions/checkout@v4
        with:
          repository: dieterbaier/dieterbaier
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      - name: update readme on profile repo
        if: needs.detect-changes.outputs.readme == 'true'
        run: |
          cp build/readme/README.md profile/README.md
          cd profile
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      # --- GitLab README ---
      - name: push readme to gitlab profile
        if: needs.detect-changes.outputs.readme == 'true'
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/brdietdidi/brdietdidi.git gitlab-repo
          cp build/readme/README.md gitlab-repo/README.md
          cd gitlab-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      # --- Pages ---
      - name: Upload Pages artifact
        if: needs.detect-changes.outputs.architecture == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/architecture

      - name: Deploy to GitHub Pages
        if: needs.detect-changes.outputs.architecture == 'true'
        uses: actions/deploy-pages@v4