name: Build Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.setImageName.outputs.IMAGE_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute Docker hash
        id: docker_hash
        run: echo "hash=$(sha256sum Dockerfile .dockerignore | sha256sum | cut -c1-12)" >> $GITHUB_OUTPUT

      - name: Set image name
        id: setImageName
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/docs-pipeline:${{ steps.docker_hash.outputs.hash }}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME_LATEST=ghcr.io/${{ github.repository_owner }}/docs-pipeline:latest" >> $GITHUB_OUTPUT

      - name: Check if dockerfile is changed
        id: check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep Dockerfile; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.check.outputs.changed == 'true'
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image if needed
        if: steps.check.outputs.changed == 'true'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ steps.setImageName.outputs.IMAGE_NAME }} \
            -t ${{ steps.setImageName.outputs.IMAGE_NAME_LATEST }} \
            --cache-from=type=registry,ref=${{ steps.setImageName.outputs.IMAGE_NAME_LATEST }} \
            --cache-to=type=registry,ref=${{ steps.setImageName.outputs.IMAGE_NAME_LATEST }},mode=max \
            --push .

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      readme: ${{ steps.filter.outputs.readme }}
      architecture: ${{ steps.filter.outputs.architecture }}
      site: ${{ steps.filter.outputs.site }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            readme:
              - 'README.adoc'
              - 'profile/**'
            architecture:
              - 'docs/**'
            site:
              - 'profile/**'

  build-docs:
    runs-on: ubuntu-latest
    needs: [build-image, detect-changes]
    outputs:
      isBuilt: ${{ steps.run_build.outputs.IS_BUILT }}
    if: needs.detect-changes.outputs.readme == 'true' || needs.detect-changes.outputs.architecture == 'true' || needs.detect-changes.outputs.site == 'true'

    steps:
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: $HOME/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run build
        id: run_build
        run: |
          CMD="./gradlew --no-daemon"

          if [ "${{ needs.detect-changes.outputs.readme }}" == "true" ]; then
            CMD="$CMD buildReadme"
          fi

          if [ "${{ needs.detect-changes.outputs.architecture }}" == "true" ]; then
            CMD="$CMD buildArchitecture"
          fi
          
          if [ "${{ needs.detect-changes.outputs.site }}" == "true" ]; then
            CMD="$CMD buildSite"
          fi
          
          echo "Running: $CMD"
          
          echo "IS_BUILT=false" >> $GITHUB_OUTPUT
          if [ "$CMD" == "./gradlew --no-daemon" ]; then
            echo "Nothing to build"
            exit 0
          fi
          
          echo "IS_BUILT=true" >> $GITHUB_OUTPUT
          
          IMAGE=${{ needs.build-image.outputs.image_name }}
          if ! docker image inspect $IMAGE > /dev/null 2>&1; then
            docker pull $IMAGE || (
              echo "Image not found, building locally..."
              docker buildx build \
                --load \
                -t $IMAGE \
                --cache-from=type=registry,ref=${{ needs.build-image.outputs.image_name }} \
                .
            )
          fi

          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v $HOME/.gradle:/root/.gradle \
            -w /app \
            $IMAGE \
            $CMD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.run_build.outputs.IS_BUILT == 'true'
        with:
          name: docs
          path: build/


  deploy:
    needs: [build-docs, detect-changes]
    runs-on: ubuntu-latest
    if: needs.build-docs.outputs.isBuilt == 'true'

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: build

      # --- Upload Site ---
      - name: Deploy Site (only debug yet)
        if: needs.detect-changes.outputs.site == 'true'
        run: |
          find ./build -type f

      # --- GitHub README ---
      - name: checkout github profile repo
        uses: actions/checkout@v4
        with:
          repository: dieterbaier/dieterbaier
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      - name: update readme on profile repo
        if: needs.detect-changes.outputs.readme == 'true'
        run: |
          cp build/readme/README.md profile/README.md
          cd profile
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      # --- GitLab README ---
      - name: push readme to gitlab profile
        if: needs.detect-changes.outputs.readme == 'true'
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/brdietdidi/brdietdidi.git gitlab-repo
          cp build/readme/README.md gitlab-repo/README.md
          cd gitlab-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      # --- Pages ---
      - name: Upload Pages artifact
        if: needs.detect-changes.outputs.architecture == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/architecture

      - name: Deploy to GitHub Pages
        if: needs.detect-changes.outputs.architecture == 'true'
        uses: actions/deploy-pages@v4