name: Build Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-private-space-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      readme: ${{ steps.filter.outputs.readme }}
      architecture: ${{ steps.filter.outputs.architecture }}
      site: ${{ steps.filter.outputs.site }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            readme:
              - 'src-content/profile/**'
            architecture:
              - 'src-content/docs/**'
            site:
              - 'src-content/profile/**'

  build-docs:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    environment:
      name: production
    env:
      SITE_EMAIL: ${{ secrets.SITE_EMAIL }}
      SITE_ADDRESS_NAME: ${{ secrets.SITE_ADDRESS_NAME }}
      SITE_STREET: ${{ secrets.SITE_STREET }}
      SITE_PLZ: ${{ secrets.SITE_PLZ }}
      SITE_CITY: ${{ secrets.SITE_CITY }}
      SITE_TEL: ${{ secrets.SITE_TEL }}
    outputs:
      isBuilt: ${{ steps.run_build.outputs.IS_BUILT }}
    if: needs.detect-changes.outputs.readme == 'true' || needs.detect-changes.outputs.architecture == 'true' || needs.detect-changes.outputs.site == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set image
        id: set_image
        run: echo "IMAGE_NAME=ghcr.io/docs-as-code-toolkit/docs-toolbox:v1.1.0" >> $GITHUB_OUTPUT

      - name: Pull runtime image
        run: docker pull ${{ steps.set_image.outputs.IMAGE_NAME }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: $HOME/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run build
        id: run_build
        run: |
          CMD="./gradlew --no-daemon"

          if [ "${{ needs.detect-changes.outputs.readme }}" == "true" ]; then
            CMD="$CMD buildReadme"
          fi

          if [ "${{ needs.detect-changes.outputs.architecture }}" == "true" ]; then
            CMD="$CMD buildArchitecture"
          fi
          
          if [ "${{ needs.detect-changes.outputs.site }}" == "true" ]; then
            CMD="$CMD buildSite"
          fi
          
          echo "Running: $CMD"
          
          echo "IS_BUILT=false" >> $GITHUB_OUTPUT
          if [ "$CMD" == "./gradlew --no-daemon" ]; then
            echo "Nothing to build"
            exit 0
          fi
          
          echo "IS_BUILT=true" >> $GITHUB_OUTPUT
          
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v $HOME/.gradle:/root/.gradle \
            -e SITE_EMAIL \
            -e SITE_ADDRESS_NAME \
            -e SITE_STREET \
            -e SITE_PLZ \
            -e SITE_CITY \
            -e SITE_TEL \
            -w /app \
            ${{ steps.set_image.outputs.IMAGE_NAME }} \
            $CMD

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: steps.run_build.outputs.IS_BUILT == 'true'
        with:
          name: docs
          path: build/


  deploy:
    needs: [build-docs, detect-changes]
    runs-on: ubuntu-latest
    if: needs.build-docs.outputs.isBuilt == 'true'
    environment:
      name: production
    env:
      SFTP_HOST: ${{ vars.SFTP_HOST }}
      SFTP_PORT: ${{ vars.SFTP_PORT }}
      SFTP_USER: ${{ vars.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_REMOTE_BASE: ${{ vars.SFTP_REMOTE_BASE }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs
          path: build

      - name: Install lftp
        if: needs.detect-changes.outputs.site == 'true' || needs.detect-changes.outputs.architecture == 'true'
        run: sudo apt-get update && sudo apt-get install -y lftp

      # --- Upload Site ---
      - name: Deploy site to private webspace
        if: needs.detect-changes.outputs.site == 'true'
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://$SFTP_HOST:$SFTP_PORT <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror -R --delete --verbose ./build/site ${SFTP_REMOTE_BASE}/site
          bye
          EOF

      # --- Upload Architecture ---
      - name: Deploy architecture to private webspace
        if: needs.detect-changes.outputs.architecture == 'true'
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASSWORD" sftp://$SFTP_HOST:$SFTP_PORT <<EOF
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror -R --delete --verbose ./build/architecture ${SFTP_REMOTE_BASE}/architecture
          bye
          EOF

      # --- GitHub README ---
      - name: checkout github profile repo
        if: needs.detect-changes.outputs.readme == 'true'
        uses: actions/checkout@v4
        with:
          repository: dieterbaier/dieterbaier
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      - name: update readme on profile repo
        if: needs.detect-changes.outputs.readme == 'true'
        run: |
          cp build/readme/README.md profile/README.md
          cd profile
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      # --- GitLab README ---
      - name: push readme to gitlab profile
        if: needs.detect-changes.outputs.readme == 'true'
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/brdietdidi/brdietdidi.git gitlab-repo
          cp build/readme/README.md gitlab-repo/README.md
          cd gitlab-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main