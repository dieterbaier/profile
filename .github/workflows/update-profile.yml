name: Build Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute Docker hash
        id: docker_hash
        run: echo "hash=$(sha256sum Dockerfile | cut -c1-12)" >> $GITHUB_OUTPUT

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/docs-pipeline:${{ steps.docker_hash.outputs.hash }}" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Check if image exists
        id: image_check
        run: |
          echo $IMAGE_NAME
          if docker pull $IMAGE_NAME; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.image_check.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.image_check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image if needed
        if: steps.image_check.outputs.exists == 'false'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE_NAME \
            --push .

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: $HOME/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'settings.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run build
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v $HOME/.gradle:/root/.gradle \
            -w /app \
            $IMAGE_NAME \
            ./gradlew --no-daemon buildReadme buildSite buildArchitecture

      - name: Deploy Site
        run: |
          find ./build -type f

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: build/

      - name: checkout github profile repo
        uses: actions/checkout@v4
        with:
          repository: dieterbaier/dieterbaier
          token: ${{ secrets.PROFILE_REPO_TOKEN }}
          path: profile

      - name: update readme on profile repo
        run: |
          cp build/readme/README.md profile/README.md
          cd profile
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      - name: push readme to gitlab profile
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/brdietdidi/brdietdidi.git gitlab-repo
          cp build/readme/README.md gitlab-repo/README.md
          cd gitlab-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "update README" || echo "no changes"
          git push origin HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/architecture

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4