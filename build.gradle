asciidoctorBase('buildCVPersonal','','src-content/profile/cv', 'build/cv', true, 'pdf', [ // personal PDF (not deployed to the site)
                                                                       'cvprint'       : 'true',
                                                                       'contact-street': env('CONTACT_STREET') ?: '.',
