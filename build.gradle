                                                                       'contact-city'  : env('CONTACT_CITY') ?: '.',
                                                                       'contact-tel'   : env('CONTACT_TEL') ?: '.',
                                                                       'contact-tel-print': env('CONTACT_TEL_PRINT') ?: '.',
                                                                       'contact-email' : env('CONTACT_EMAIL') ?: '.'
])
asciidoctorBase('buildCVSite','','src-content/profile/cv', 'build/site', true) // HTML
asciidoctorBase('buildCVDownload','buildCVSite','src-content/profile/cv', 'build/site/cv', false, 'pdf') // PDF download
